info:
  name: Delete Quote By ID
  type: http
  seq: 5

http:
  method: DELETE
  url: "{{baseUrl}}/{{versionApi}}/quotes/{{quote_ID}}"
  auth:
    type: apikey
    key: X-API-Key
    value: "{{API_KEY}}"
    placement: header

runtime:
  variables:
