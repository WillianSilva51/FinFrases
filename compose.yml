services:
  mongodb:
    image: docker.io/library/mongo:8.2
    container_name: finfrases-mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${user:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${password:-password123}
      MONGO_INITDB_DATABASE: finfrases
